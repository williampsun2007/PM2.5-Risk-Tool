name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push Root Contents to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # If your files live inside a folder like 'pm25-app', uncomment the next line:
          # cd pm25-app
          
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://williampsun:$HF_TOKEN@huggingface.co/spaces/williampsun/pm25-exposure-tool
          git push hf main --force